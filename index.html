<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>spcreat</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
  <script>
    function takeMeThere() {
      var input = document.getElementById("web-location");
      window.location.href = input.value;
    }
  </script>

  <div class="columns is-vcentered" style="height: 100vh;">
    <div class="column">
      <section class="section">
        <div class="container" style="max-width: 300px;">
          <div class="box has-text-centered">
            <input id="web-location" class="input" type="text" placeholder="Location..." />
            <button onclick="takeMeThere();" class="button download-button has-text-weight-extrabold" style="width:100%; margin-top:10px;">Take me there</button>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
